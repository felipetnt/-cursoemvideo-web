<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes com Google Font</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap');
        
        body{
            font-family: Arial, Helvetica, sans-serif;
             font-size: 1em;
             color: black;
        }

        h1 {
            font-family: "Google Sans Flex", sans-serif;
            font-optical-sizing: auto;
            font-weight: 1em;
            font-style: normal;
            font-variation-settings:
            "slnt" 0, "wdth" 100, "GRAD" 0, "ROND" 0;
            color: red;
        }
    </style>
</head>
<body>
    <h1>Titulo</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Excepturi exercitationem recusandae cumque nulla blanditiis placeat consequuntur necessitatibus voluptatum, aliquam molestiae sed minus corporis similique ullam temporibus laborum iste? Cumque, commodi.</p>
</body>
</html>
