<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste com Imagens</title>
</head>
<body>
    <h1>Testando carga e Imagens</h1>
    <p>Abaixo voce vai ver uma imagem que esta na mesma pasta</p>
    <img src="HTML5.png" alt="Logo HTML5">
    <p>Agora voce ve um que esta dentro de uma pasta</p>
    <img src="imagens/HTML5.png" alt="Logo HTML dentro da pasta">
    <p>Agora uma outra imagem dentro da mesma pasta</p>
    <img src="imagens/css3.jpg" alt="Logo CSS3 dentro da pasta">
    <p>Tambem podemos carregar imagens externas de outros servidores</p>
    <img src="https://skillforge.com/courses/javascript-training/" alt="Logo JavaScript">
</body>
</html>
